<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin · Bento grid — LinxTimes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,900&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;color:#101613;min-height:100vh;background:#eaeee9}
a.back{position:fixed;top:16px;right:16px;z-index:30;color:#101613;text-decoration:none;font-size:13px;background:#fff;border:1px solid rgba(0,0,0,.08);padding:8px 14px;border-radius:99px;box-shadow:0 6px 16px -8px rgba(0,0,0,.2)}
.app{display:flex;min-height:100vh}
.sb{width:76px;padding:20px 0;display:flex;flex-direction:column;align-items:center;gap:14px}
.m{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#2aa87b,#0b5e42);display:grid;place-items:center;font-family:'Fraunces';font-weight:900;color:#fff}
.ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:#6b756e;font-size:17px;cursor:pointer;background:#fff;box-shadow:0 4px 12px -8px rgba(0,0,0,.3)}
.ic.on{background:#0d3522;color:#fff}
.main{flex:1;padding:24px 26px 24px 6px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
h1{font-size:26px;font-weight:700}
.pill{background:#0d3522;color:#fff;border:none;font-size:13px;font-weight:600;padding:9px 18px;border-radius:99px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:118px;gap:14px}
.tile{border-radius:20px;padding:18px;box-shadow:0 18px 40px -30px rgba(16,60,40,.5)}
.w{background:#fff}.k{font-size:12px;color:#6b756e;font-weight:500}.v{font-family:'Space Grotesk';font-size:34px;font-weight:600;margin-top:6px}
.dark{background:#0d3522;color:#fff}.dark .k{color:rgba(255,255,255,.6)}
.gold{background:linear-gradient(135deg,#e6c34c,#caa53f);color:#3a2f0a}.gold .k{color:#5a4a12}
.sheet{grid-column:span 2;grid-row:span 2;background:#fff;padding:0;overflow:hidden;display:flex;flex-direction:column}
.sheet .h{padding:16px 18px;border-bottom:1px solid #eef1ee;font-weight:600;font-size:14px}
.slot{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid #f4f6f3;font-size:13px}
.slot:last-child{border:0}.time{font-family:'Space Grotesk';font-weight:600;width:52px}.who{flex:1}.who span{color:#8a938c;font-size:11px;margin-left:6px}
.bdg{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:#d5f2e4;color:#0f6e4d}
.op{flex:1;color:#b7bfb8}
.chart{grid-column:span 2;background:#fff;display:flex;align-items:flex-end;gap:6px;padding:18px}
.bar{flex:1;background:linear-gradient(180deg,#2aa87b,#0b5e42);border-radius:6px 6px 0 0}
.tall{grid-row:span 2;background:#f3f7f4;display:flex;flex-direction:column;justify-content:center;gap:8px}
.tall .row{height:10px;border-radius:5px;background:rgba(13,53,34,.1)}
</style></head><body>
<a class="back" href="/previews/admin.html">← all directions</a>
<div class="app">
  <aside class="sb"><div class="m">W</div><div class="ic on">◧</div><div class="ic">▤</div><div class="ic">◎</div><div class="ic">◷</div><div class="ic">$</div><div class="ic">⚙</div></aside>
  <main class="main">
    <div class="top"><h1>Overview · Tue Jul 2</h1><button class="pill">+ Add walk-in</button></div>
    <div class="grid">
      <div class="tile w"><div class="k">Bookings today</div><div class="v">42</div></div>
      <div class="tile dark"><div class="k">Players today</div><div class="v">118</div></div>
      <div class="tile sheet">
        <div class="h">The Liberator · today</div>
        <div class="slot"><div class="time">7:00</div><div class="who">Jane Golfer<span>2·18H·cart</span></div><span class="bdg">Paid</span></div>
        <div class="slot"><div class="time">7:10</div><div class="op">Open</div></div>
        <div class="slot"><div class="time">7:20</div><div class="who">Mark Reyes<span>4·18H</span></div><span class="bdg">Paid</span></div>
        <div class="slot"><div class="time">7:30</div><div class="op">Open</div></div>
        <div class="slot"><div class="time">7:40</div><div class="who">Tom Blair<span>1·9H</span></div><span class="bdg" style="background:#eee;color:#777">Course</span></div>
      </div>
      <div class="tile gold"><div class="k">Revenue today</div><div class="v">$1,240</div></div>
      <div class="tile tall"><div class="k" style="padding:0 2px">This week</div><div class="row" style="width:90%"></div><div class="row" style="width:70%"></div><div class="row" style="width:82%"></div><div class="row" style="width:55%"></div></div>
      <div class="tile chart"><div class="bar" style="height:40%"></div><div class="bar" style="height:65%"></div><div class="bar" style="height:50%"></div><div class="bar" style="height:80%"></div><div class="bar" style="height:60%"></div><div class="bar" style="height:95%"></div><div class="bar" style="height:72%"></div></div>
    </div>
  </main>
</div></body></html>
